# Daily snapshot: 2× GoldAPI (XAU/USD, XAG/USD) + 1× ExchangeRate-API, then commit data/price-snapshot.json
name: Refresh price snapshot

on:
  schedule:
    - cron: "0 16 * * *" # 16:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: price-snapshot
  cancel-in-progress: true

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build price snapshot
        env:
          GOLD_API_KEY: ${{ secrets.GOLD_API_KEY }}
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
        run: npm run prices:build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price-snapshot.json
          if git diff --staged --quiet; then
            echo "No snapshot change"
            exit 0
          fi
          git commit -m "chore(prices): daily snapshot"
          git push
